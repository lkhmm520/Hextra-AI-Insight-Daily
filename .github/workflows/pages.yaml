# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  workflow_run:
    workflows: ["Update Content from Daily Notes"]
    types:
      - completed
      
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

env:
  TZ: Asia/Shanghai
  
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.9
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history for .GitInfo and .Lastmod
          submodules: recursive
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Setup Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          BASE_URL="${{ vars.APP_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="${{ steps.pages.outputs.base_url }}"
          fi
          BASE_URL="${BASE_URL%/}"
          export BASE_URL
          echo "Using base URL: $BASE_URL"
          hugo \
            --gc --minify \
            --baseURL "$BASE_URL/"
          BASE_PATH=$(python3 - <<'PY'
          from urllib.parse import urlparse
          import os
          base_url = os.environ.get("BASE_URL", "")
          path = urlparse(base_url).path.rstrip("/")
          print(path)
          PY
          )
          export BASE_PATH
          if [ -n "$BASE_PATH" ]; then
            echo "Rewriting root-relative internal links with base path: $BASE_PATH"
            python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          base_path = os.environ.get("BASE_PATH", "").rstrip("/")
          if not base_path:
              raise SystemExit(0)

          internal = r"(?:20\d{2}-\d{2}|blog|tags|about|contact|privacy-policy|terms-of-service|en(?:/|$)|images|index\.xml)"
          pattern = re.compile(r'(?P<attr>\b(?:href|src)=["\'])/(?!(?:/|%s(?:/|$)))(?P<path>%s[^"\']*)' % (re.escape(base_path.lstrip("/")), internal))

          for file_path in Path("public").rglob("*"):
              if file_path.suffix.lower() not in {".html", ".xml"}:
                  continue
              text = file_path.read_text(encoding="utf-8")
              new_text = pattern.sub(lambda m: f'{m.group("attr")}{base_path}/{m.group("path")}', text)
              if new_text != text:
                  file_path.write_text(new_text, encoding="utf-8")
          PY
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
